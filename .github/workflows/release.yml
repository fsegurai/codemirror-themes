name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to create release for (e.g., 6.29.2)'
        required: false

permissions:
  contents: write
  discussions: write

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag or input
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(jq -r .version < package.json)
          fi
          
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=v$VERSION" >> $GITHUB_ENV

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "PREV_TAG=$PREV_TAG" >> $GITHUB_ENV

      - name: Generate release notes
        id: notes
        run: |
          {
            echo "NOTES<<EOF"
            echo "## Version ${{ env.VERSION }}"
            echo ""
            echo "**Release Date:** $(date -u +'%Y-%m-%d')"
            echo ""
            
            if [ ! -z "${{ env.PREV_TAG }}" ]; then
              echo "### Changes"
              echo ""
              git log --oneline ${{ env.PREV_TAG }}..HEAD --grep="chore\|perf\|refactor" --invert-grep | head -20
              echo ""
            fi
            
            echo "### 📦 Packages"
            echo "This release contains updates to 26+ theme packages and utilities."
            echo ""
            
            echo "### 🔗 Links"
            echo "- [NPM Package](https://www.npmjs.com/@fsegurai/codemirror-themes)"
            echo "- [Bundle Package](https://www.npmjs.com/@fsegurai/codemirror-theme-bundle)"
            echo "- [CHANGELOG](./CHANGELOG.md)"
            echo ""
            
            echo "### ℹ️ Note"
            echo "This release was published via Azure DevOps Pipelines. GitHub Actions handles visibility and documentation."
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Determine pre-release status
        id: prerelease
        run: |
          if [[ "${{ env.VERSION }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "PRERELEASE=false" >> $GITHUB_ENV
          else
            echo "PRERELEASE=true" >> $GITHUB_ENV
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.VERSION }}
          body: ${{ env.NOTES }}
          draft: false
          prerelease: ${{ env.PRERELEASE }}
          generate_release_notes: true

      - name: Comment in discussions
        if: success()
        uses: actions/github-script@v6
        with:
          script: |
            const version = process.env.VERSION;
            
            // Post to releases discussion
            try {
              await github.rest.discussions.createInCategory({
                owner: context.repo.owner,
                repo: context.repo.repo,
                category_id: 'releases',
                title: `📢 ${version} Released`,
                body: `Version ${version} has been released! Check the [GitHub Release](${context.payload.release.html_url}) for details.`
              });
            } catch (error) {
              console.log('Could not post to discussions:', error.message);
            }
        env:
          VERSION: ${{ env.VERSION }}
        continue-on-error: true
