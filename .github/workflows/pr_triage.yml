name: "Pull Request Triage"
on:
  pull_request_target:
    types: [ opened, ready_for_review, reopened ]

permissions:
  contents: read
  pull-requests: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      # Grab sources to get latest labeler.yml
      - name: Fetch sources
        uses: actions/checkout@v4
        with:
          # Ensure we pin the source origin as pull_request_target run under forks.
          fetch-depth: 0
          repository: fsegurai/codemirror-themes
          ref: main

      - name: Update labels based on changes
        uses: actions/labeler@v5
        with:
          sync-labels: true
          dot: true

      - name: Assign PR creator and add welcome comment
        uses: actions/github-script@v6
        with:
          script: |
            const pr = context.payload.pull_request;
            const assignees = pr.assignees.map(assignee => assignee.login);
            let assignee = pr.user.login;

            // Assign PR creator
            if (!assignees.includes(assignee)) {
              if (assignee.includes('bot')) {
                await github.rest.pulls.requestReviewers({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  reviewers: ['fsegurai']
                });
              } else {
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  assignees: [assignee]
                });
              }
            }

      - name: Add first-time contributor welcome
        uses: actions/github-script@v6
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            
            // Get all PRs from this author
            const userPRs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: author,
              state: 'all'
            });
            
            // If this is their first PR, send welcome message
            if (userPRs.data.length === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: '👋 **Welcome, @' + author + '!**\n\nThank you for your contribution to codemirror-themes! Here\'s what to expect:\n\n- **Tests run automatically** - our CI pipeline validates linting and builds\n- **Reviews** - a maintainer will review your changes\n- **Labels** - we auto-tag PRs to help organize discussions\n- **Questions?** - feel free to ask in the comments\n\n📚 **Helpful Resources:**\n- [Contributing Guide](./CONTRIBUTING.md)\n- [AGENTS Guide](./AGENTS.md) - Project architecture\n- [Development Setup](./README.md#development)\n\nWe appreciate your help! 🎉'
              });
            }

      - name: Add Dependabot PR comment
        uses: actions/github-script@v6
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            
            // Check if this is a Dependabot PR
            if (!author.includes('dependabot')) {
              return;
            }
            
            // Check if we already commented
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number
            });
            
            const hasDepbotComment = comments.data.some(c => 
              c.body.includes('Dependabot Update') || c.body.includes('@dependabot')
            );
            
            if (!hasDepbotComment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: '🤖 **Dependabot Update**\n\nThis is an automated dependency update. A few things to know:\n\n- **Bun workspace**: All dependencies are managed through the root `package.json`\n- **Build checks**: The PR build validates all packages can compile\n- **Security**: Our security scan pipeline reviews all updates\n- **Merge**: Maintainers will review and merge periodically\n\n💡 Tip: Use `@dependabot rebase` to update this PR if conflicts occur.'
              });
            }

      - name: Request specific reviewers for themes
        uses: actions/github-script@v6
        with:
          script: |
            const pr = context.payload.pull_request;
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });
            
            // Check if it's a theme-specific change
            const themeFiles = files.data.filter(f => f.filename.startsWith('packages/'));
            
            if (themeFiles.length > 0 && themeFiles.length <= 5) {
              const themes = new Set();
              themeFiles.forEach(f => {
                const match = f.filename.match(/packages\/([^/]+)\//);
                if (match) themes.add(match[1]);
              });
            
              if (themes.size > 0) {
                const body = `📦 **Theme(s) Modified:** ${Array.from(themes).join(', ')}`;
            
                // Add to PR body if not already there
                if (!pr.body.includes(body)) {
                  await github.rest.pulls.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number,
                    body: pr.body ? pr.body + '\n\n' + body : body
                  });
                }
              }
            }

