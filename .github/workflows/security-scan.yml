name: Security Scan

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  schedule:
    # Run weekly on Monday at 2 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write
  issues: write

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'

  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run bun audit
        id: audit
        run: |
          echo "Running dependency audit..."
          bun audit --production || EXIT_CODE=$?
          exit ${EXIT_CODE:-0}
        continue-on-error: true

      - name: Comment on PR if vulnerabilities found
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Dependency Audit Warning**\n\nVulnerabilities detected in dependencies. Run `bun audit` locally for details.'
            })

  trivy-fs-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-fs'

      - name: Upload Trivy report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-fs-report
          path: trivy-results.sarif
          retention-days: 30

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [codeql, dependency-check, trivy-fs-scan]
    if: always()
    steps:
      - name: Create security summary
        uses: actions/github-script@v6
        with:
          script: |
            const codeqlStatus = '${{ needs.codeql.result }}';
            const depStatus = '${{ needs.dependency-check.result }}';
            const trivyStatus = '${{ needs.trivy-fs-scan.result }}';
            
            let summary = '## 🔒 Security Scan Summary\n\n';
            summary += `- CodeQL: ${codeqlStatus === 'success' ? '✅' : '⚠️'}\n`;
            summary += `- Dependency Audit: ${depStatus === 'success' ? '✅' : '⚠️'}\n`;
            summary += `- Trivy Scan: ${trivyStatus === 'success' ? '✅' : '⚠️'}\n`;
            
            if (context.eventName === 'pull_request') {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary
              });
            }

      - name: Report job status
        if: failure()
        run: echo "Security scan failed. Check GitHub Security tab for details."

